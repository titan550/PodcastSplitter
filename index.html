<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast Splitter</title>
    <script>
      // COI service worker registration — makes the app work on GitHub
      // Pages where COOP/COEP headers can't be set at the HTTP layer.
      // %BASE_URL% is replaced at build time so the path is correct for
      // both root and /<repo>/ project-page deploys. On first install we
      // reload once so the worker takes control of the current page.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("%BASE_URL%coi-sw.js")
          .then((reg) => {
            if (reg.active && !navigator.serviceWorker.controller) {
              window.location.reload();
            }
          })
          .catch((err) => {
            console.warn("COI service worker failed to register:", err);
          });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
